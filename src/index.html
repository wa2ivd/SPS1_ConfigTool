<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>SPS-1 Config Tool</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1>SPS-1 Configuration Tool</h1>
    <p>Smart Power Switch configuration over serial.</p>

    <section class="controls">
      <button id="connect">Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
      <span id="status">Idle</span>
    </section>

    <section>
      <h2>Received</h2>
      <div id="log" class="log"></div>
    </section>

    <div id="port-chooser" class="modal" hidden>
      <div class="modal-card">
        <h2>Select serial port</h2>
        <ul id="port-chooser-list"></ul>
        <button id="port-chooser-cancel">Cancel</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
